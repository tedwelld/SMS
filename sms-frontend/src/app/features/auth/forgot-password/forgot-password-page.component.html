<div class="auth-shell">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h2>Forgot Password</h2>

    <label>Username or email <input type="text" formControlName="usernameOrEmail" /></label>
    <label>New password <input type="password" formControlName="newPassword" /></label>

    @if (message()) {
      <p class="ok">{{ message() }}</p>
    }

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button class="btn-warning-action" type="submit" [disabled]="submitting()">{{ submitting() ? 'Submitting...' : 'Reset password' }}</button>
    <a routerLink="/auth/login">Back to login</a>
  </form>
</div>
